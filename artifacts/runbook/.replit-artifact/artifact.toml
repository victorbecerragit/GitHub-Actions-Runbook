kind = "web"
previewPath = "/"
title = "GitHub Actions Runbook"
version = "1.0.0"
id = "artifacts/runbook"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21489

[services.development]
run = "pnpm --filter @workspace/runbook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/runbook", "run", "build" ]
publicDir = "artifacts/runbook/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21489"
BASE_PATH = "/"
